{% extends 'myapp/base.html' %}
{% load static %}

{% block contentblock %}

<style>
    body {
        background-color: #0f172a;
        color: #e2e8f0;
    }

    .delete-card {
        background-color: #1e293b;
        border: 1px solid #334155;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        overflow: hidden;
    }

    .delete-header {
        background-color: #dc2626;
        padding: 25px;
        text-align: center;
        color: white;
        font-size: 24px;
        font-weight: bold;
    }

    .delete-body {
        padding: 25px;
    }

    .label {
        font-size: 12px;
        color: #94a3b8;
        text-transform: uppercase;
    }

    .value {
        font-size: 18px;
        font-weight: 600;
        color: white;
    }

    .delete-footer {
        background-color: rgba(15,23,42,0.6);
        padding: 15px;
        border-top: 1px solid #334155;
    }

    .btn-delete {
        border: 2px solid #ef4444;
        color: #ef4444;
        font-weight: 600;
    }

    .btn-delete:hover {
        background-color: #ef4444;
        color: white;
    }

    .btn-back {
        border: 2px solid #475569;
        color: #cbd5f5;
        font-weight: 600;
    }

    .btn-back:hover {
        background-color: #334155;
    }
</style>

<div class="container mt-5">

    <h2 class="text-center text-white mb-4">Delete Page</h2>

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="delete-card">

                <!-- HEADER -->
                <div class="delete-header">
                    Do you want to delete?
                </div>

                <!-- BODY -->
                <div class="delete-body">

                    <div class="mb-3">
                        <div class="label">Student ID</div>
                        <div class="value">{{ del.stuId }}</div>
                    </div>

                    <div class="mb-3">
                        <div class="label">Full Name</div>
                        <div class="value">{{ del.stuName }}</div>
                    </div>

                    <div>
                        <div class="label">Marks</div>
                        <div class="value">{{ del.stuMarks }}</div>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="delete-footer">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="d-flex gap-2">

                            <button type="submit" class="btn btn-delete w-50"
                                onclick="return confirm('Are you sure you want to delete this record?')">
                                Delete
                            </button>

                            <a href="{% url 'students' %}" class="btn btn-back w-50">
                                Back
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
